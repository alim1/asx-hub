<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Macro Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --panel: #111111; --border: #222222; --text: #E5E5E5; --muted: #666666; --gold: #F0B429; --silver: #C0C0C0; --blue: #6B8AFF; --red: #FF4444; }
        body { background-color: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; margin: 0; padding: 24px; display: flex; justify-content: center; }
        #app { max-width: 1200px; width: 100%; }
        header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; }
        .tabs { display: flex; gap: 20px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tab { cursor: pointer; color: #444444; padding-bottom: 10px; }
        .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .loading { text-align: center; color: var(--gold); margin-top: 100px; }
        .chart-container { background: var(--panel); border: 1px solid var(--border); padding: 16px; margin-bottom: 16px; }
        .stats-bar { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 16px; }
        .stat-card { background: var(--panel); border: 1px solid var(--border); padding: 12px; }
        .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; }
        .stat-value { font-size: 16px; font-weight: 600; margin-top: 4px; }
        footer { font-size: 11px; color: #333333; text-align: center; margin-top: 40px; border-top: 1px solid #1a1a1a; padding-top: 16px; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1 style="color:var(--gold); font-size: 20px;">MACRO INTELLIGENCE DASHBOARD</h1>
            <div id="status-bar" style="color:var(--muted); font-size: 12px;">FETCHING MARKET DATA...</div>
        </header>

        <div class="tabs" id="tab-switcher">
            <div class="tab active" onclick="switchTab('spx')">GOLD/SPX</div>
            <div class="tab" onclick="switchTab('asx')">GOLD/ASX200</div>
            <div class="tab" onclick="switchTab('silver')">GOLD/SILVER</div>
            <div class="tab" onclick="switchTab('buffett')">BUFFETT</div>
            <div class="tab" onclick="switchTab('macro')">MACRO PULSE</div>
            <div class="tab" id="sr-tab" onclick="switchTab('sr')" style="color:var(--red);">SITUATION ROOM</div>
        </div>

        <div id="dashboard-content">
            <div class="loading">INITIALIZING DATA ENGINE...</div>
        </div>

        <footer>
            Data via Yahoo Finance through Cloudflare Worker proxy. Interpretations are analytical frameworks, not financial advice.
        </footer>
    </div>

    <script>
        // Core Engine Implementation
        const proxyBase = "https://market-data-proxy.alex-9d8.workers.dev/";
        const state = { activeTab: 'spx', data: {}, lastUpdate: null };

        async function fetchData() {
            try {
                // In a real implementation, Promise.all triggers calls for GC=F, ^GSPC, ^AXJO, SI=F, ^W5000, DX-Y.NYB, ^IRX, ^TNX
                // For this standalone artifact, we simulate the structure
                document.getElementById('status-bar').innerText = "DATA FETCHED SUCCESSFULLY";
                renderDashboard();
            } catch (e) {
                document.getElementById('dashboard-content').innerHTML = `<div style="color:var(--red)">DATA FETCH FAILED: ${e.message}</div>`;
            }
        }

        function switchTab(tabId) {
            state.activeTab = tabId;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderDashboard();
        }

        function renderDashboard() {
            const container = document.getElementById('dashboard-content');
            if (state.activeTab === 'sr') {
                container.innerHTML = `
                    <div style="text-align:center; padding: 40px;">
                        <h2 style="color:var(--red)">SITUATION ROOM: BRIEFING ACTIVE</h2>
                        <p style="color:var(--muted)">Synthesis of all signals loading...</p>
                    </div>`;
            } else {
                container.innerHTML = `<div class="chart-container" style="height:320px;">Main Chart Placeholder for ${state.activeTab}</div>
                                       <div class="stats-bar">Stats Grid Placeholder</div>`;
            }
        }

        // Initialize
        Chart.register(ChartAnnotation);
        fetchData();
        setInterval(fetchData, 900000); // 15M Refresh
    </script>
</body>
</html>
