<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ASX Hub</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1117;--bg2:#161b24;--bg3:#1c2230;--bg4:#232b3a;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#e2e8f0;--text2:#8b98b0;--text3:#4a5568;
  --green:#00c97a;--green-dim:rgba(0,201,122,0.12);
  --red:#f05252;--red-dim:rgba(240,82,82,0.12);
  --amber:#f5a623;--amber-dim:rgba(245,166,35,0.1);
  --blue:#4a9cf6;--blue-dim:rgba(74,156,246,0.1);
  --r:8px;--r2:12px;
}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:14px}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}
.app{display:grid;grid-template-rows:52px 1fr;height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:50;flex-wrap:wrap}
.logo{font-size:14px;font-weight:600;letter-spacing:.5px;display:flex;align-items:center;gap:8px;color:var(--text)}
.logo-pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,201,122,.4)}50%{opacity:.8;box-shadow:0 0 0 5px rgba(0,201,122,0)}}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tb-input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:5px 10px;color:var(--text);font-size:12px;width:220px;outline:none}
.tb-input:focus{border-color:var(--border2)}
.tb-input::placeholder{color:var(--text3)}
.btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:5px 12px;color:var(--text2);font-size:12px;display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg4);border-color:var(--border2);color:var(--text)}
.btn-green{background:var(--green);border-color:var(--green);color:#000;font-weight:600}
.btn-green:hover{background:#00e68a;border-color:#00e68a;color:#000}
.btn-ai{background:var(--blue-dim);border-color:rgba(74,156,246,.3);color:var(--blue)}
.btn-ai:hover{background:rgba(74,156,246,.18)}
.btn-full{width:100%;justify-content:center;margin-top:10px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.sdot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
.sdot.err{background:var(--red)}
.sdot.busy{background:var(--amber);animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stxt{font-size:11px;color:var(--text3);font-family:monospace}
.body{display:grid;grid-template-columns:180px 1fr;overflow:hidden;height:100%}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:12px 8px;overflow-y:auto}
.nav-grp{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:10px 10px 5px}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border-radius:var(--r);border:none;background:none;color:var(--text2);font-size:13px;transition:all .15s;margin-bottom:1px;text-align:left}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,201,122,.15)}
.nav-btn i{font-size:15px;width:15px}
.content{overflow-y:auto;padding:22px}
.page-title{font-size:18px;font-weight:300;letter-spacing:-.3px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.upd{font-size:11px;color:var(--text3);font-family:monospace}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.metric{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.metric-lbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.metric-val{font-size:20px;font-weight:300;color:var(--text);font-family:monospace;letter-spacing:-.5px}
.metric-sub{font-size:11px;margin-top:3px;font-family:monospace}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:18px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.card-title i{font-size:14px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);text-align:left;padding:0 10px 9px;border-bottom:1px solid var(--border)}
td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.tk{font-weight:600;font-family:monospace;font-size:12px}
.tks{font-size:11px;color:var(--text3);margin-top:1px}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;font-family:monospace}
.b-up{background:var(--green-dim);color:var(--green)}
.b-dn{background:var(--red-dim);color:var(--red)}
.b-neu{background:var(--bg4);color:var(--text2)}
.up{color:var(--green)}.dn{color:var(--red)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.two{grid-template-columns:1fr}}
.field-lbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.fi{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s;width:100%}
.fi:focus{border-color:var(--border2)}
.fi::placeholder{color:var(--text3)}
select.fi option{background:var(--bg3)}
.ai-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-top:10px}
.ai-lbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--green);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.ai-txt{font-size:13px;color:var(--text2);line-height:1.75;white-space:pre-wrap}
.ai-loading{color:var(--text3);font-size:13px;display:flex;align-items:center;gap:7px}
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.pill{padding:4px 11px;border-radius:99px;font-size:11px;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .15s}
.pill:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.hbar{height:3px;background:var(--bg4);border-radius:2px;margin-top:4px}
.hfill{height:3px;background:var(--blue);border-radius:2px}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.star{color:var(--amber)}
.add-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px}
.sec-bar{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.sec-bar-lbl{width:95px;font-size:11px;color:var(--text3);text-align:right;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sec-bar-track{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.sec-bar-fill{height:5px;border-radius:3px}
.sec-bar-val{width:52px;font-size:11px;font-family:monospace;font-weight:600}
.spin{animation:sp 1s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.sk{background:var(--bg4);border-radius:4px;animation:pu 1.4s ease-in-out infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.25}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
</style>
